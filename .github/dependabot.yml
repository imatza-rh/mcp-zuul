version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      patch-and-minor:
        patterns: ["*"]
        update-types: ["patch", "minor"]
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      patch-and-minor:
        patterns: ["*"]
        update-types: ["patch", "minor"]
