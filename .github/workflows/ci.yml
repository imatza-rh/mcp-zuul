name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-python: true
          cache-dependency-glob: "pyproject.toml"
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --extra dev --python ${{ matrix.python-version }}
      - name: Run tests
        run: uv run pytest tests/ -v --cov=mcp_zuul --cov-fail-under=85 --cov-report=term-missing --cov-report=xml
      - name: Coverage summary
        if: matrix.python-version == '3.13' && always()
        run: uv run coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
          cache-python: true
          cache-dependency-glob: "pyproject.toml"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check src/ tests/
      - name: Ruff format
        run: uv run ruff format --check src/ tests/
      - name: Mypy
        run: uv run mypy src/mcp_zuul/
      - name: Audit dependencies
        run: |
          # Ignored: CVE-2026-4539 - ReDoS in pygments AdlLexer (CVSS 3.3 Low).
          # pygments is a transitive dev dep (pytest/rich), not used by mcp-zuul.
          # No fix available as of 2026-03-25. Staleness guard below will catch updates.
          uv run pip-audit --ignore-vuln CVE-2026-4539
      - name: Check stale audit ignores
        run: |
          version=$(uv run python -c "import pygments; print(pygments.__version__)")
          if [ "$version" != "2.19.2" ]; then
            echo "::error::pygments updated to $version - re-evaluate CVE-2026-4539 ignore in 'Audit dependencies' step"
            exit 1
          fi
